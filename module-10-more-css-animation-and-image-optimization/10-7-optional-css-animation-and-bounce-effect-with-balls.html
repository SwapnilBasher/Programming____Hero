<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @keyframes ping-pong {
            from {
                left: 0;
            }

            to {
                left: 600px;
            }
        }

        @keyframes bounce {
            0% {
                top: 0px;
                left: 0px;
            }

            25% {
                top: 200px;
                left: 150px;
                /* background-color: green; */
            }

            50% {
                left: 300px;
                top: 0px;
                /* background-color: red; */
                scale: 1.3;
            }

            75% {
                left: 500px;
                top: 200px;
                /* background-color: blue; */
            }

            100% {
                top: 0px;
                left: 600px;
                /* background-color: black; */
            }
        }

        .stage {
            width: 700px;
            height: 300px;
            background-color: aqua;
            border: 2px solid steelblue;
            position: relative;
            animation: bounce 5s ease-in-out 1s infinite alternate;
        }

        .ball {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: yellow;
            position: relative;
            /* animation: ping-pong 1s ease-in-out 1s infinite alternate; */

            animation: bounce 3s ease-in-out 1s infinite alternate;
            
        }
    </style>
</head>

<body>
    <h2>
        Explore Animation
    </h2>
    <div class="stage">
        <div class="ball"></div>
    </div>
</body>

</html>
