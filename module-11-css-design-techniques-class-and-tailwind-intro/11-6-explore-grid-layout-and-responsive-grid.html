<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Grid using TailWind CSS</title>
</head>

<body>
    <!-- Grid container -->
    <section class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-4 gap-y-10">
        <!-- .bg-pink-300.text-2xl{Box-$}*12  -->
        <div class="bg-pink-300 text-2xl">Box-1</div>
        <div class="bg-pink-300 text-2xl">Box-2</div>
        <div class="bg-pink-300 text-2xl">Box-3</div>
        <div class="bg-pink-300 text-2xl xl:row-span-4">Box-4</div>
        <div class="bg-pink-300 text-2xl col-span-2">Box-5</div>
        <div class="bg-pink-300 text-2xl">Box-6</div>
        <div class="bg-pink-300 text-2xl">Box-7</div>
        <div class="bg-pink-300 text-2xl lg:col-span-3">Box-8</div>
        <div class="bg-pink-300 text-2xl">Box-9</div>
        <div class="bg-pink-300 text-2xl">Box-10</div>
        <div class="bg-pink-300 text-2xl">Box-11</div>
        <div class="bg-pink-300 text-2xl">Box-12</div>
    </section>
</body>

</html>
